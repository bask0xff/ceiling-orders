<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Панель расчетов стоимости{% endblock %}</title>
    <!-- Bootstrap 5, Иконки и Шрифты -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #0f172a; 
            color: #f8fafc;
        }
        .navbar-dark-custom {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(51, 65, 85, 0.5);
        }
        .brand-neon {
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(56, 189, 248, 0.2);
        }
        .card-dark {
            background-color: #1e293b;
            border: 1px solid rgba(51, 65, 85, 0.6);
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.25);
        }
        .form-control-dark {
            background-color: #0f172a;
            border: 1px solid #334155;
            color: #f8fafc;
            border-radius: 10px;
        }
        .form-control-dark:focus {
            background-color: #0f172a;
            border-color: #38bdf8;
            color: #f8fafc;
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.15);
        }
        .btn-gradient-blue {
            background: linear-gradient(135deg, #0284c7, #4f46e5);
            border: none;
            color: white;
            font-weight: 500;
            border-radius: 10px;
            transition: all 0.2s ease;
        }
        .btn-gradient-blue:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.4);
            color: white;
        }
        .footer-dark {
            border-top: 1px solid rgba(51, 65, 85, 0.4);
            color: #64748b;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark navbar-dark-custom sticky-top mb-4">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="/">
                <i class="bi bi-grid-1x2-fill text-info me-2 fs-4"></i>
                <span class="brand-neon fs-4">CeilingPro</span>
            </a>
            <div class="ms-auto d-flex align-items-center">
                {% if user %}
                    <div class="bg-slate px-3 py-1.5 rounded-3 border border-secondary me-3 d-none d-sm-block" style="background: #1e293b;">
                        <i class="bi bi-shield-check text-info me-2"></i>
                        <span class="small text-muted">Оператор:</span> <strong class="text-white">{{ user }}</strong>
                    </div>
                    <a href="/logout" class="btn btn-outline-danger btn-sm rounded-3 px-3">
                        <i class="bi bi-power me-1"></i> Выйти
                    </a>
                {% endif %}
            </div>
        </div>
    </nav>

    <main class="container min-vh-100">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer-dark py-4 mt-5 text-center">
        <p class="mb-1">© 2026 CeilingPro. Изолированная среда проектирования.</p>
        <small>Docker Container: #8083 | DB: SQLite</small>
    </footer>

</body>
</html>
