<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Калькулятор потолков{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f6f9; color: #333; }
        .navbar-brand { font-weight: 700; color: #0d6efd !important; }
        .card { border: none; border-radius: 12px; }
        .btn-primary { background-color: #0d6efd; border: none; border-radius: 8px; padding: 10px; }
        .btn-success { background-color: #198754; border: none; border-radius: 8px; padding: 10px; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">📐 ПотолокМастер</a>
            <div>
                {% if user %}
                    <span class="navbar-text me-3">Рады видеть, <strong>{{ user }}</strong>!</span>
                    <a href="/logout" class="btn btn-outline-danger btn-sm rounded-3">Выйти</a>
                {% endif %}
            </div>
        </div>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
