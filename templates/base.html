<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Радостные Потолки — Калькулятор{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Nunito', sans-serif; 
            background: linear-gradient(125deg, #a7f3d0, #fef08a, #86efac, #6ee7b7);
            background-size: 400% 400%;
            animation: auroraGradient 20s ease infinite;
            background-attachment: fixed;
            color: #1e293b;
        }

        @keyframes auroraGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .navbar-joy {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 3px solid #10b981;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.1);
        }
        .brand-joy {
            font-weight: 800;
            background: linear-gradient(45deg, #059669, #d97706);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .card-joy {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(5px);
            border: none;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(30, 41, 59, 0.05);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .card-joy:hover {
            transform: translateY(-4px);
            box-shadow: 0 15px 35px rgba(16, 185, 129, 0.15);
        }
        .btn-joy {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            border: none;
            color: white;
            font-weight: 700;
            border-radius: 16px;
            box-shadow: 0 6px 20px rgba(16, 185, 129, 0.25);
            transition: all 0.2s ease;
        }
        .btn-joy:hover {
            background: linear-gradient(135deg, #059669 0%, #10b981 100%);
            transform: scale(1.02);
            box-shadow: 0 8px 25px rgba(16, 185, 129, 0.35);
            color: white;
        }
        .btn-joy-secondary {
            background: linear-gradient(135deg, #d97706 0%, #b45309) !important;
            color: white !important;
            border: none;
            font-weight: 700;
            border-radius: 16px;
            box-shadow: 0 6px 20px rgba(217, 119, 6, 0.25);
        }
        .footer-joy {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            border-top: 3px solid #10b981;
            color: #64748b;
        }

        .animate-float {
            animation: floating 4s ease-in-out infinite;
        }
        @keyframes floating {
            0% { transform: translate(0, 0px); }
            50% { transform: translate(0, 8px); }
            100% { transform: translate(0, 0px); }
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-light navbar-joy sticky-top mb-5">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="/">
                <i class="bi bi-emoji-smile-fill text-success me-2 fs-3 animate-float"></i>
                <span class="brand-joy fs-3">ПотолкиРадости</span>
            </a>
            <div class="ms-auto d-flex align-items-center">
                {% if user %}
                    <div class="bg-success bg-opacity-20 px-3 py-2 rounded-pill me-3 border border-success" style="background: rgba(25, 135, 84, 0.2); backdrop-filter: blur(5px);">
                        <i class="bi bi-magic text-success me-1"></i>
                        <span class="small text-dark fw-bold">Мастер уюта: {{ user }}</span>
                    </div>
                    <a href="/logout" class="btn btn-outline-danger btn-sm rounded-pill px-3 fw-bold">
                        Выйти 👋
                    </a>
                {% endif %}
            </div>
        </div>
    </nav>

    <main class="container min-vh-100">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer-joy py-4 mt-5 text-center">
        <div class="container fw-bold">
            <p class="mb-1 text-dark">✨ Мы дарим людям радость, свет и чистоту в каждый дом! ✨</p>
            <small class="text-muted">Модуль хорошего настроения | Мелмак эдишн | 2026</small>
        </div>
    </footer>

</body>
</html>
