{% extends "base.html" %}
{% block title %}Авторизация / Регистрация{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        {% if error %}
        <div class="alert alert-danger rounded-3" role="alert">{{ error }}</div>
        {% endif %}
        {% if message %}
        <div class="alert alert-success rounded-3" role="alert">{{ message }}</div>
        {% endif %}
        
        <div class="card shadow-sm mb-4">
            <div class="card-body p-4">
                <h3 class="card-title text-center mb-4 font-weight-bold">Войти в личный кабинет</h3>
                <form action="/login" method="post">
                    <div class="mb-3">
                        <label class="form-label text-muted">Имя пользователя (логин)</label>
                        <input type="text" name="username" class="form-control" placeholder="alex77" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-muted">Пароль</label>
                        <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 shadow-sm">Войти</button>
                </form>
            </div>
        </div>

        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h5 class="text-center text-muted mb-3">Ещё нет аккаунта?</h5>
                <form action="/register" method="post">
                    <div class="mb-3">
                        <label class="form-label text-muted">Придумайте логин</label>
                        <input type="text" name="username" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-muted">Придумайте пароль</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-success w-100 shadow-sm">Зарегистрироваться</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
